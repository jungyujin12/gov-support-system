# ============================================================
#  GitHub Actions 자동화 워크플로우
#  파일 위치: .github/workflows/daily_crawler.yml
#
#  동작 방식:
#    - 매일 오전 9시 (한국 시간, UTC+9 = UTC 00:00) 자동 실행
#    - API 키는 GitHub Secrets에서 안전하게 주입
#    - 수집 결과를 Artifacts로 저장 (7일간 보관)
# ============================================================

name: 정부지원사업 공고 자동 수집

on:
  # ── 자동 실행: 매일 00:00 UTC = 한국 09:00 ──
  schedule:
    - cron: "0 0 * * 1-5"   # 평일(월~금)만 실행
    # - cron: "0 0 * * *"   # 매일 실행하려면 이 줄 사용

  # ── 수동 실행: GitHub Actions 탭에서 직접 트리거 가능 ──
  workflow_dispatch:
    inputs:
      pages:
        description: "교육부 크롤링 페이지 수"
        required: false
        default: "3"

jobs:
  crawl:
    name: 공고 수집 및 저장
    runs-on: ubuntu-latest

    steps:
      # ── 1. 저장소 체크아웃 ──
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 환경 설정 ──
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"   # 의존성 캐싱으로 빌드 속도 향상

      # ── 3. 의존성 설치 ──
      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas python-dotenv openpyxl

      # ── 4. 크롤러 실행 ──
      #    ⚠️ 보안 핵심: API 키는 GitHub Secrets에서만 주입
      #    설정 방법: 저장소 Settings > Secrets and variables
      #              > Actions > New repository secret
      - name: 🚀 크롤러 실행
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python crawler.py

      # ── 5. 수집 결과를 Artifact로 저장 ──
      - name: 💾 결과 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 공고수집결과_${{ github.run_id }}
          path: output/
          retention-days: 7   # 7일간 보관 후 자동 삭제

      # ── 6. 실패 시 알림 (선택사항) ──
      - name: ❌ 실패 알림
        if: failure()
        run: |
          echo "크롤러 실행 실패! GitHub Actions 로그를 확인하세요."
          # 여기에 이메일 또는 슬랙 실패 알림 추가 가능

# ============================================================
#  GitHub Secrets 설정 방법 (최초 1회만):
#
#  1. GitHub 저장소 페이지 접속
#  2. Settings > Secrets and variables > Actions
#  3. [New repository secret] 클릭
#  4. 아래 두 가지 Secret 추가:
#     Name: BIZINFO_API_KEY
#     Secret: (발급받은 API 키 붙여넣기)
#
#     Name: SLACK_WEBHOOK_URL
#     Secret: (슬랙 웹훅 URL 붙여넣기)
#
#  ⚠️ Secret 값은 등록 후 다시 볼 수 없습니다.
#     필요 시 삭제 후 재등록하세요.
# ============================================================
