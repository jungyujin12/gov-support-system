# ================================================================
#  GitHub Actions v3
#  .github/workflows/daily_crawler.yml
#
#  변경사항:
#    - /data/latest.json + /data/latest.csv 커밋
#    - /archive/날짜.json 자동 누적 커밋
#    - /data/archive_index.json 커밋
#    - GitHub Pages 자동 배포
# ================================================================

name: 정부지원사업 공고 자동 수집 v3

on:
  schedule:
    - cron: "0 0 * * 1-5"   # 평일 09:00 KST
  workflow_dispatch:          # 수동 실행

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 저장소 커밋 권한

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 전체 히스토리 (archive 병합용)

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 패키지 설치
        run: |
          pip install requests beautifulsoup4 pandas python-dotenv openpyxl

      - name: 🚀 크롤러 실행
        env:
          BIZINFO_API_KEY:   ${{ secrets.BIZINFO_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python crawler_v3.py

      - name: 📊 수집 결과 확인
        run: |
          echo "=== 수집 결과 ==="
          python -c "
          import json, pathlib
          f = pathlib.Path('data/latest.json')
          if f.exists():
              d = json.loads(f.read_text(encoding='utf-8'))
              print(f'전체: {d[\"total\"]}건')
              for src, cnt in d.get('sources', {}).items():
                  print(f'  {src}: {cnt}건')
          else:
              print('data/latest.json 없음')
          "
          echo ""
          echo "=== archive 목록 ==="
          ls archive/ 2>/dev/null || echo "archive 없음"

      - name: 📤 결과 저장소 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경된 파일만 add
          git add data/latest.json
          git add data/latest.csv
          git add data/archive_index.json 2>/dev/null || true
          git add archive/ 2>/dev/null || true

          # 변경사항 있을 때만 커밋
          git diff --staged --quiet || \
            git commit -m "data: 공고 자동 수집 $(date +'%Y-%m-%d') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 💾 Artifacts 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 공고수집_${{ github.run_id }}
          path: |
            data/latest.json
            data/latest.csv
          retention-days: 30

      - name: ❌ 실패 시 로그
        if: failure()
        run: cat crawler.log 2>/dev/null || echo "로그 없음"

# ================================================================
#  GitHub Pages 설정:
#
#  저장소 Settings → Pages
#  → Source: Deploy from a branch
#  → Branch: main / (root)
#  → Save
#
#  접속: https://[계정].github.io/gov-support-system/
#
#  대시보드에서 자동 로드:
#  fetch('data/latest.json')
# ================================================================
